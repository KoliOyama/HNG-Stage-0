<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <article
      data-testid="test-todo-card"
      class="todo-card"
      role="region"
      aria-label="Todo task card"
    >
      <h2 class="sr-only">Task: Finish Stage 0 Task</h2>

      <header class="card-header">
        <div class="badge-row">
          <span
            data-testid="test-todo-priority"
            class="badge badge-high"
            aria-label="Priority: High"
            >High</span
          >

          <span
            data-testid="test-todo-status"
            id="todo-status-badge"
            class="badge badge-inprogress"
            aria-label="Status: In Progress"
            >In Progress</span
          >
        </div>
      </header>

      <div class="card-body">
        <div class="checkbox-wrapper">
          <label for="todo-complete" class="sr-only"
            >Mark task as complete</label
          >
          <input
            type="checkbox"
            id="todo-complete"
            data-testid="test-todo-complete-toggle"
            aria-describedby="todo-title"
          />
        </div>

        <div class="task-content">
          <h3 data-testid="test-todo-title" id="todo-title" class="todo-title">
            Finish your Stage 0 Task
          </h3>

          <p data-testid="test-todo-description" class="todo-description">
            Complete the frontend wizards task, host your site and submit the
            repo.
          </p>

          <div class="meta-block">
            <div class="meta-row">
              <span class="meta-label">Due:</span>
              <time
                data-testid="test-todo-due-date"
                datetime="2026-05-01T18:00:00Z"
                class="meta-value"
                >May 1, 2026 — 6:00 PM</time
              >
            </div>

            <div class="meta-row">
              <span class="meta-label">Remaining:</span>

              <span
                data-testid="test-todo-time-remaining"
                id="time-remaining"
                class="meta-value"
                aria-live="polite"
                aria-label="Time remaining"
                >Calculating...</span
              >
            </div>
          </div>

          <ul
            data-testid="test-todo-tags"
            class="tags-list"
            role="list"
            aria-label="Task tags"
          >
            <li>
              <span class="tag" data-testid="test-todo-tag-work"># work</span>
            </li>
            <li>
              <span class="tag" data-testid="test-todo-tag-urgent"
                ># urgent</span
              >
            </li>
            <li>
              <span class="tag" data-testid="test-todo-tag-design"
                ># design</span
              >
            </li>
          </ul>
        </div>
      </div>

      <footer>
        <div class="card-actions">
          <button
            data-testid="test-todo-edit-button"
            class="btn btn-edit"
            aria-label="Edit task"
            onclick="handleEdit()"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              />
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              />
            </svg>
            Edit
          </button>

          <button
            data-testid="test-todo-delete-button"
            class="btn btn-delete"
            aria-label="Delete task"
            onclick="handleDelete()"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
              <path d="M10 11v6M14 11v6" />
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
            </svg>
            Delete
          </button>
        </div>
      </footer>
    </article>
    <script src="index.js"></script>
  </body>
</html>
